name: Sync and Patch Upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync_and_patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Config Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add Upstream and Fetch
        run: |
          git remote add upstream https://github.com/AndyNew2/hacs-APsystemsEZ1_local.git
          git fetch upstream

      - name: Merge Upstream Changes
        run: |
          git merge upstream/main --allow-unrelated-histories -X theirs --no-commit || true

      - name: Apply Custom Patches
        run: |
          # --- 1. CODE & STRUKTUR (manifest.json etc.) ---
          if [ -d "custom_components/apsystemsapi_local" ]; then
            mv custom_components/apsystemsapi_local custom_components/apsystems
          fi

          # Patch manifest.json nur, wenn thowiegit noch nicht drin steht
          if ! grep -q "@thowiegit" custom_components/apsystems/manifest.json; then
            sed -i 's/apsystemsapi_local/apsystems/g' custom_components/apsystems/manifest.json
            sed -i 's/"name": "APsystems Local API"/"name": "APsystems"/g' custom_components/apsystems/manifest.json
            sed -i 's/"@AndyNew2", "@mawoka-myblock", "@SonnenladenGmbH"/"@thowiegit", "@AndyNew2", "@mawoka-myblock", "@SonnenladenGmbH"/g' custom_components/apsystems/manifest.json
          fi

          # --- 2. README.md SCHUTZ-LOGIK ---
          # Wenn das Upstream-Badge existiert, wurde die Datei bereits erfolgreich gepatcht.
          # In diesem Fall überspringen wir alle Änderungen an der README.md komplett.
          if grep -q "\[upstream-shield\]" README.md; then
            echo "README.md bereits gepatcht (Upstream-Badge gefunden). Überspringe README-Patches."
          else
            echo "README.md wird gepatcht..."
            
            # Alle Ersetzungen in einem Rutsch
            sed -i 's/apsystemsapi_local/apsystems/g' README.md
            sed -i 's/AndyNew2\/hacs-APsystemsEZ1_local/thowiegit\/hacs-APsystemsEZ1_local_API/g' README.md
            sed -i 's/APsystems EZ1 local Integration/APsystems EZ1 local API Integration/g' README.md
            sed -i 's/popular EZ1 Microinverter to fix/popular EZ1 Microinverter Integration to fix/g' README.md
            
            # Upstream-Badge am Ende einfügen (Platzhalter + Referenzen)
            sed -i '0,/\]\[releases\]/ s/\]\[releases\]/&\n[![Upstream Release][upstream-shield]][upstream-repo]/' README.md
            echo "" >> README.md
            echo "[upstream-shield]: https://img.shields.io/github/v/release/AndyNew2/hacs-APsystemsEZ1_local?label=upstream%20version&style=for-the-badge" >> README.md
            echo "[upstream-repo]: https://github.com/AndyNew2/hacs-APsystemsEZ1_local" >> README.md
          fi

      - name: Commit and Push
        run: |
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-Patch: Guarded sync (README protection active)"
            git push origin main
          else
            echo "No changes to commit"
          fi

