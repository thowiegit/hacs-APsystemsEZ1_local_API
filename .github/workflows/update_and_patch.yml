name: Sync and Patch Upstream

on:
  schedule:
    - cron: '0 0 * * *' # Läuft täglich um Mitternacht
  workflow_dispatch:   # Ermöglicht manuelles Auslösen über den "Actions" Tab

jobs:
  sync_and_patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Config Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add Upstream and Fetch
        run: |
          git remote add upstream https://github.com/AndyNew2/hacs-APsystemsEZ1_local.git
          git fetch upstream

      - name: Merge Upstream Changes
        run: |
          # Merget Änderungen vom Original, bevorzugt bei Konflikten deren Stand (wird danach gepatcht)
          git merge upstream/main --allow-unrelated-histories -X theirs --no-commit || true

      - name: Apply Custom Patches
        run: |
          # 1. & 2. Verzeichnis umbenennen
          if [ -d "custom_components/apsystemsapi_local" ]; then
            mv custom_components/apsystemsapi_local custom_components/apsystems
          fi

          # 3. Domain-Strings in Code und Konfiguration ersetzen
          find . -type f \( -name "*.py" -o -name "*.json" -o -name "*.yaml" \) -print0 | xargs -0 sed -i 's/apsystemsapi_local/apsystems/g'

          # 4. Anzeigenamen in manifest.json anpassen
          find . -type f \( -name "manifest.json" \) -print0 | xargs -0 sed -i 's/APsystems Local API/APsystems/g'

          # 5. Dich als Code-Owner hinzufügen
          find . -type f \( -name "manifest.json" \) -print0 | xargs -0 sed -i 's/"@AndyNew2", "@mawoka-myblock", "@SonnenladenGmbH"/"@thowiegit", "@AndyNew2", "@mawoka-myblock", "@SonnenladenGmbH"/g'

          # 7. README Link/Titel anpassen
          find . -type f \( -name "README.md" \) -print0 | xargs -0 sed -i 's/hacs-APsystemsEZ1_local/hacs-APsystemsEZ1_local_API/g'

          # 8. Beschreibung in README präzisieren
          find . -type f \( -name "README.md" \) -print0 | xargs -0 sed -i 's/Modification of popular EZ1 Microinverter to fix/Modification of popular EZ1 Microinverter Integration to fix/'

          # 9. Titel in README ergänzen
          find . -type f \( -name "README.md" \) -print0 | xargs -0 sed -i 's/APsystems EZ1 local Integration/APsystems EZ1 local API Integration/'

          # 10. Letzte Reste von apsystemsapi_local in README ersetzen
          find . -type f \( -name "README.md" \) -print0 | xargs -0 sed -i 's/apsystemsapi_local/apsystems/g'

          # 11. Badge-URLs auf dein Repo umbiegen (Shields.io etc.)
          find . -type f \( -name "README.md" \) -print0 | xargs -0 sed -i 's/AndyNew2\/hacs-APsystemsEZ1_local/thowiegit\/hacs-APsystemsEZ1_local/g'

          # 12. Upstream-Badge wieder einfügen (falls durch Merge gelöscht)
          # Wir prüfen, ob das Badge schon da ist, wenn nicht: wieder einfügen
          if ! grep -q "\[upstream-shield\]" README.md; then

            # Füge den Platzhalter oben ein:
            # Füge den Platzhalter NACH der ersten kompletten Link-Referenz von [releases] ein
            sed -i '0,/\]\[releases\]/ s/\]\[releases\]/&\n[![Upstream Release][upstream-shield]][upstream-repo]/' README.md

            # Füge die URL-Definitionen ganz am Ende der Datei an
            echo "[upstream-shield]: https://img.shields.io/github/v/release/AndyNew2/hacs-APsystemsEZ1_local?label=upstream%20version&style=for-the-badge" >> README.md
            echo "[upstream-repo]: https://github.com/AndyNew2/hacs-APsystemsEZ1_local" >> README.md
          fi

      - name: Commit and Push
        run: |
          git add .
          # Nur committen, wenn es tatsächlich Änderungen gab
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-Patch: Sync with upstream and apply custom structure for @thowiegit"
            git push origin main
          else
            echo "No changes to commit"
          fi
